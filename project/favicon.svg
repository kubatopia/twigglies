  <line x1="16" y1="1" x2="16" y2="8" stroke="#4A7050" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Left leaf -->
  <ellipse cx="7" cy="11" rx="3.5" ry="5" fill="#5C8A62" transform="rotate(-50 7 11)"/>
  <line x1="9.5" y1="8.5" x2="5" y2="13.5" stroke="#4A7050" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Right leaf -->
  <ellipse cx="23" cy="8.5" rx="3.5" ry="5" fill="#7AAF80" transform="rotate(40 23 8.5)"/>
  <line x1="20.5" y1="10.5" x2="25.5" y2="6.5" stroke="#5C8A62" stroke-width="0.7" stroke-linecap="round"/>
