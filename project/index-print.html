<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Twigglies — Tiny Twigs. Big Smiles.</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FDFAF5; color: #2C2416; overflow-x: hidden; }
  :root {
    --cream: #FDFAF5;
    --beige: #F5EFE0;
    --sage: #5C8A62;
    --sage-light: #E8F0E9;
    --sage-mid: #A8C9AD;
    --sky: #B8D8E8;
    --sky-light: #EAF4F9;
    --coral: #E8715A;
    --coral-light: #FCEAE6;
    --yellow: #F5D97A;
    --brown: #2C2416;
    --brown-mid: #6B5B3E;
    --brown-light: #A08060;
    --radius-sm: 12px;
    --radius-md: 20px;
    --radius-lg: 32px;
    --radius-xl: 48px;
  }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: white; border-radius: 20px; padding: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    width: 260px; display: none; font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel h3 { font-family: 'Fredoka', sans-serif; font-size: 18px; margin-bottom: 16px; color: var(--sage); }
  .tweak-row { margin-bottom: 14px; }
  .tweak-row label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--brown); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .tweak-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 5px 12px; border-radius: 100px; border: 2px solid transparent; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; }
  .chip.active { border-color: var(--sage); }
  .tweak-toggle { display: flex; gap: 8px; align-items: center; cursor: pointer; }
  .toggle-track { width: 40px; height: 22px; border-radius: 11px; background: #ddd; position: relative; transition: background 0.2s; }
  .toggle-track.on { background: var(--sage); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: transform 0.2s; }
  .toggle-track.on .toggle-thumb { transform: translateX(18px); }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <h3>✦ Tweaks</h3>
  <div class="tweak-row">
    <label>Color Theme</label>
    <div class="tweak-chips" id="theme-chips">
      <div class="chip active" style="background:#E8F0E9;color:#5C8A62" data-theme="sage">Sage</div>
      <div class="chip" style="background:#EAF4F9;color:#3A7FA0" data-theme="sky">Sky</div>
      <div class="chip" style="background:#FCEAE6;color:#E8715A" data-theme="coral">Coral</div>
      <div class="chip" style="background:#FEF8E8;color:#C4970A" data-theme="honey">Honey</div>
    </div>
  </div>
  <div class="tweak-row">
    <label>Hero Layout</label>
    <div class="tweak-chips" id="layout-chips">
      <div class="chip active" style="background:#F5EFE0;color:#6B5B3E" data-layout="centered">Centered</div>
      <div class="chip" style="background:#F5EFE0;color:#6B5B3E" data-layout="split">Split</div>
    </div>
  </div>
  <div class="tweak-row">
    <label>Show Mascots</label>
    <div class="tweak-toggle" id="mascot-toggle">
      <div class="toggle-track on" id="mascot-track"><div class="toggle-thumb"></div></div>
      <span>Twig characters visible</span>
    </div>
  </div>
  <div class="tweak-row">
    <label>Dark Mode</label>
    <div class="tweak-toggle" id="dark-toggle">
      <div class="toggle-track" id="dark-track"><div class="toggle-thumb"></div></div>
      <span>Dark background</span>
    </div>
  </div>
</div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "sage",
  "layout": "centered",
  "showMascots": true,
  "darkMode": false
}/*EDITMODE-END*/;

const { useState, useEffect, useRef } = React;

// ─── SVG Mascot Characters ───────────────────────────────────────────────────
function TwigMascot({ color = "#5C8A62", face = "happy", size = 80, style }) {
  const eyes = face === "happy"
    ? <><circle cx="30" cy="36" r="3.5" fill="#2C2416"/><circle cx="50" cy="36" r="3.5" fill="#2C2416"/></>
    : <><circle cx="30" cy="36" r="3.5" fill="#2C2416"/><circle cx="50" cy="36" r="3.5" fill="#2C2416"/></>;
  const mouth = face === "happy"
    ? <path d="M32 46 Q40 54 48 46" stroke="#2C2416" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
    : <path d="M32 48 Q40 44 48 48" stroke="#2C2416" strokeWidth="2.5" fill="none" strokeLinecap="round"/>;
  return (
    <svg width={size} height={size*1.4} viewBox="0 0 80 112" fill="none" style={style}>
      {/* Body twig */}
      <rect x="32" y="60" width="16" height="46" rx="8" fill={color} opacity="0.9"/>
      {/* Arms */}
      <rect x="10" y="68" width="24" height="10" rx="5" fill={color} opacity="0.75" transform="rotate(-15 10 68)"/>
      <rect x="46" y="68" width="24" height="10" rx="5" fill={color} opacity="0.75" transform="rotate(15 70 68)"/>
      {/* Head */}
      <ellipse cx="40" cy="32" rx="24" ry="26" fill={color}/>
      {/* Cheeks */}
      <ellipse cx="22" cy="42" rx="7" ry="5" fill="white" opacity="0.3"/>
      <ellipse cx="58" cy="42" rx="7" ry="5" fill="white" opacity="0.3"/>
      {eyes}
      {mouth}
      {/* Leaf on top */}
      <ellipse cx="40" cy="8" rx="8" ry="12" fill={color} opacity="0.6" transform="rotate(-10 40 8)"/>
      <ellipse cx="52" cy="5" rx="6" ry="9" fill={color} opacity="0.4" transform="rotate(20 52 5)"/>
    </svg>
  );
}

// ─── Placeholder image ────────────────────────────────────────────────────────
function Placeholder({ w, h, label, bg = "#E8F0E9", color = "#5C8A62", radius = 20 }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: radius,
      background: bg, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: 8,
      flexShrink: 0, overflow: 'hidden', position: 'relative'
    }}>
      <svg width="100%" height="100%" style={{position:'absolute',top:0,left:0}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id={`stripe-${label}`} patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="20" stroke={color} strokeWidth="1" opacity="0.15"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#stripe-${label})`}/>
      </svg>
      <span style={{fontFamily:'monospace', fontSize:11, color, textAlign:'center', padding:'0 12px', position:'relative', zIndex:1, lineHeight:1.4}}>{label}</span>
    </div>
  );
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function Nav({ darkMode }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const bg = darkMode ? '#1A1408' : scrolled ? 'rgba(253,250,245,0.96)' : 'transparent';
  const borderColor = darkMode ? 'rgba(255,255,255,0.08)' : scrolled ? 'rgba(92,138,98,0.12)' : 'transparent';

  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:1000,
      background: bg,
      backdropFilter: scrolled ? 'blur(20px)' : 'none',
      borderBottom: `1px solid ${borderColor}`,
      transition: 'all 0.3s',
      padding: '0 24px'
    }}>
      <div style={{
        maxWidth:1100, margin:'0 auto', display:'flex',
        alignItems:'center', justifyContent:'space-between',
        height:64
      }}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
          <div style={{
            width:32, height:32, borderRadius:10,
            background:'var(--sage)', display:'flex', alignItems:'center', justifyContent:'center'
          }}>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="7" y="2" width="4" height="14" rx="2" fill="white"/>
              <ellipse cx="9" cy="4" rx="4" ry="5" fill="white" opacity="0.7"/>
              <ellipse cx="5" cy="7" rx="3" ry="4" fill="white" opacity="0.5" transform="rotate(-20 5 7)"/>
              <ellipse cx="13" cy="7" rx="3" ry="4" fill="white" opacity="0.5" transform="rotate(20 13 7)"/>
            </svg>
          </div>
          <span style={{fontFamily:'Fredoka',fontWeight:600,fontSize:22,color: darkMode?'white':'var(--brown)',letterSpacing:'-0.01em'}}>
            twigglies
          </span>
        </div>

        {/* Desktop links */}
        <div style={{display:'flex',alignItems:'center',gap:32,color: darkMode?'rgba(255,255,255,0.75)':'var(--brown-mid)',fontSize:14,fontWeight:500}}>
          {['Products','Why Miswak','Reviews','FAQ'].map(l => (
            <a key={l} href={`#${l.toLowerCase().replace(' ','-')}`} style={{textDecoration:'none',color:'inherit',transition:'color 0.2s'}}
              onMouseEnter={e=>e.target.style.color='var(--sage)'}
              onMouseLeave={e=>e.target.style.color=''}>
              {l}
            </a>
          ))}
        </div>

        {/* CTA */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <a href="#subscribe" style={{textDecoration:'none'}}>
            <button style={{
              background:'var(--sage)', color:'white',
              border:'none', borderRadius:100, padding:'10px 22px',
              fontFamily:'Plus Jakarta Sans', fontWeight:700, fontSize:14,
              cursor:'pointer', transition:'all 0.2s',
              boxShadow:'0 2px 12px rgba(92,138,98,0.35)'
            }}
              onMouseEnter={e=>{ e.target.style.transform='translateY(-1px)'; e.target.style.boxShadow='0 4px 20px rgba(92,138,98,0.45)'; }}
              onMouseLeave={e=>{ e.target.style.transform=''; e.target.style.boxShadow='0 2px 12px rgba(92,138,98,0.35)'; }}>
              Shop Now
            </button>
          </a>
        </div>
      </div>
    </nav>
  );
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
function Hero({ theme, layout, showMascots, darkMode }) {
  const accentColors = { sage:'#5C8A62', sky:'#3A7FA0', coral:'#E8715A', honey:'#C4970A' };
  const accent = accentColors[theme];
  const bgMap = {
    sage: darkMode ? '#1A1408' : 'linear-gradient(160deg, #FDFAF5 0%, #EDF5EE 60%, #FDFAF5 100%)',
    sky: darkMode ? '#081420' : 'linear-gradient(160deg, #FDFAF5 0%, #E6F2F8 60%, #FDFAF5 100%)',
    coral: darkMode ? '#1A0B08' : 'linear-gradient(160deg, #FDFAF5 0%, #FCEAE6 60%, #FDFAF5 100%)',
    honey: darkMode ? '#1A1208' : 'linear-gradient(160deg, #FDFAF5 0%, #FEF6D8 60%, #FDFAF5 100%)',
  };

  const mascotColors = ['#5C8A62','#E8715A','#3A7FA0','#F5C842'];
  const textColor = darkMode ? 'white' : 'var(--brown)';
  const subColor = darkMode ? 'rgba(255,255,255,0.65)' : 'var(--brown-mid)';

  return (
    <section style={{
      minHeight:'100vh',
      background: bgMap[theme],
      display:'flex', alignItems:'center', justifyContent:'center',
      padding: '100px 24px 60px',
      position:'relative', overflow:'hidden'
    }}>
      {/* Floating blobs */}
      <div style={{position:'absolute',top:'15%',left:'5%',width:300,height:300,borderRadius:'50%',
        background: accent, opacity:0.06, filter:'blur(60px)', pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'10%',right:'8%',width:250,height:250,borderRadius:'50%',
        background:'#E8715A', opacity:0.06, filter:'blur(50px)', pointerEvents:'none'}}/>

      <div style={{
        maxWidth:1100, width:'100%',
        display:'flex', flexDirection: layout==='split' ? 'row' : 'column',
        alignItems:'center', justifyContent:'center',
        gap: layout==='split' ? 60 : 40,
        textAlign: layout==='split' ? 'left' : 'center'
      }}>
        {/* Text */}
        <div style={{flex:1, maxWidth: layout==='split'? 520 : 680}}>
          {/* Badge */}
          <div style={{
            display:'inline-flex', alignItems:'center', gap:8,
            background: darkMode ? 'rgba(255,255,255,0.1)' : 'white',
            borderRadius:100, padding:'8px 16px', marginBottom:28,
            border:`1px solid ${accent}30`,
            fontSize:13, fontWeight:600, color: accent,
            boxShadow:'0 2px 12px rgba(0,0,0,0.06)'
          }}>
            <span>🌿</span>
            <span>Dentist-Loved · Naturally Clean · Kids Adore Them</span>
          </div>

          <h1 style={{
            fontFamily:'Fredoka', fontWeight:700,
            fontSize: 'clamp(48px,7vw,86px)',
            lineHeight:1.05, color: textColor,
            letterSpacing:'-0.02em', marginBottom:24
          }}>
            Tiny Twigs.<br/>
            <span style={{color: accent}}>Big Smiles.</span>
          </h1>

          <p style={{
            fontSize:'clamp(16px,2vw,20px)', color: subColor,
            lineHeight:1.65, maxWidth:480,
            margin: layout==='centered' ? '0 auto 36px' : '0 0 36px',
            fontWeight:400
          }}>
            Natural miswak chew sticks that help make healthy mouths fun — 
            for little ones ages 1–8. No brushing drama required.
          </p>

          <div style={{display:'flex', gap:14, flexWrap:'wrap', justifyContent: layout==='centered'?'center':'flex-start'}}>
            <button style={{
              background: accent, color:'white', border:'none',
              borderRadius:100, padding:'16px 32px',
              fontFamily:'Plus Jakarta Sans', fontWeight:700, fontSize:16,
              cursor:'pointer', transition:'all 0.2s',
              boxShadow:`0 4px 24px ${accent}50`
            }}
              onMouseEnter={e=>{ e.target.style.transform='translateY(-2px)'; e.target.style.boxShadow=`0 8px 32px ${accent}60`; }}
              onMouseLeave={e=>{ e.target.style.transform=''; e.target.style.boxShadow=`0 4px 24px ${accent}50`; }}>
              Shop Twigglies →
            </button>
            <button style={{
              background:'transparent', color: textColor,
              border:`2px solid ${darkMode ? 'rgba(255,255,255,0.2)' : 'rgba(44,36,22,0.15)'}`,
              borderRadius:100, padding:'16px 28px',
              fontFamily:'Plus Jakarta Sans', fontWeight:600, fontSize:16,
              cursor:'pointer', transition:'all 0.2s'
            }}
              onMouseEnter={e=>{ e.target.style.borderColor = accent; e.target.style.color = accent; }}
              onMouseLeave={e=>{ e.target.style.borderColor=''; e.target.style.color=''; }}>
              Watch How It Works
            </button>
          </div>

          {/* Social proof strip */}
          <div style={{
            display:'flex', alignItems:'center', gap:20, marginTop:40,
            justifyContent: layout==='centered' ? 'center' : 'flex-start',
            flexWrap:'wrap'
          }}>
            {[
              { n:'12,000+', l:'Happy Families' },
              { n:'4.9★', l:'Avg Rating' },
              { n:'92%', l:'Would Reorder' }
            ].map(({n,l}) => (
              <div key={l} style={{textAlign: layout==='centered' ? 'center' : 'left'}}>
                <div style={{fontFamily:'Fredoka', fontWeight:700, fontSize:22, color: accent}}>{n}</div>
                <div style={{fontSize:12, color: subColor, fontWeight:500}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Visual */}
        <div style={{
          flex: layout==='split' ? '0 0 420px' : 'none',
          position:'relative', display:'flex', alignItems:'center', justifyContent:'center'
        }}>
          {/* Product hero */}
          <div style={{
            width: layout==='split' ? 380 : 320, height: layout==='split' ? 380 : 320,
            borderRadius: layout==='split' ? 48 : 160,
            background: darkMode ? 'rgba(255,255,255,0.07)' : 'white',
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow:'0 20px 80px rgba(0,0,0,0.10)',
            position:'relative', overflow:'hidden'
          }}>
            <Placeholder w="100%" h="100%" label="hero product photo\nTwigglies Original tube" bg={darkMode?'#2A2418':'#F5EFE0'} color="#8B7355" radius={layout==='split'?48:160}/>
            {showMascots && (
              <div style={{position:'absolute', bottom:-10, right:-10}}>
                <TwigMascot color={accent} size={90} style={{filter:`drop-shadow(0 4px 12px ${accent}40)`}}/>
              </div>
            )}
          </div>

          {/* Floating tags */}
          {[
            { text:'Natural Miswak Root', icon:'🌿', top:'8%', right:'-8%', bg: darkMode?'rgba(255,255,255,0.12)':'white' },
            { text:'Kids Love It', icon:'💚', bottom:'12%', left:'-10%', bg: darkMode?'rgba(255,255,255,0.12)':'white' },
            { text:'Dentist Trusted', icon:'🦷', top:'60%', right:'-12%', bg: darkMode?'rgba(255,255,255,0.12)':'white' },
          ].map(({text,icon,bg,...pos}) => (
            <div key={text} style={{
              position:'absolute', ...pos,
              background: bg,
              borderRadius:100, padding:'8px 16px',
              display:'flex', alignItems:'center', gap:6,
              fontSize:12, fontWeight:700, color: darkMode?'white':'var(--brown)',
              boxShadow:'0 4px 20px rgba(0,0,0,0.10)',
              border:`1px solid ${accent}20`, whiteSpace:'nowrap',
              animation:'floatBadge 3s ease-in-out infinite'
            }}>
              <span>{icon}</span><span>{text}</span>
            </div>
          ))}

          {/* Mascot row */}
          {showMascots && (
            <div style={{
              position:'absolute', bottom:'-30px', left:'50%',
              transform:'translateX(-50%)',
              display:'flex', gap:0
            }}>
              {mascotColors.slice(1).map((c,i) => (
                <TwigMascot key={i} color={c} size={48} style={{
                  marginLeft: i===0?0:-10,
                  filter:`drop-shadow(0 2px 8px ${c}40)`,
                  transform:`rotate(${(i-1)*8}deg)`
                }}/>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Scroll cue */}
      <div style={{
        position:'absolute', bottom:32, left:'50%', transform:'translateX(-50%)',
        display:'flex', flexDirection:'column', alignItems:'center', gap:8,
        opacity:0.4, fontSize:12, color: textColor, fontWeight:500
      }}>
        <span>Scroll to explore</span>
        <div style={{width:1.5, height:30, background: textColor, borderRadius:2, animation:'scrollCue 1.5s ease-in-out infinite'}}/>
      </div>
    </section>
  );
}

// ─── TRUST BAR ────────────────────────────────────────────────────────────────
function TrustBar({ theme, darkMode }) {
  const accent = { sage:'#5C8A62', sky:'#3A7FA0', coral:'#E8715A', honey:'#C4970A' }[theme];
  const items = [
    '🦷 Pediatric Dentist Recommended',
    '🌿 100% Natural Ingredients',
    '🧪 No Artificial Sweeteners',
    '✓ Safe for Ages 1–8',
    '♻️ Sustainably Sourced',
    '🏆 Parent Choice Award 2024',
  ];
  return (
    <div style={{
      background: accent, overflow:'hidden', padding:'14px 0',
      position:'relative'
    }}>
      <div style={{
        display:'flex', gap:48, animation:'ticker 30s linear infinite',
        whiteSpace:'nowrap', width:'max-content'
      }}>
        {[...items,...items,...items].map((item,i) => (
          <span key={i} style={{
            color:'white', fontSize:13, fontWeight:600,
            letterSpacing:'0.02em', display:'flex', alignItems:'center', gap:8
          }}>
            {item}
            <span style={{opacity:0.4, marginLeft:16}}>✦</span>
          </span>
        ))}
      </div>
    </div>
  );
}

// ─── WHY PARENTS LOVE ─────────────────────────────────────────────────────────
function WhyParents({ theme, showMascots, darkMode }) {
  const accent = { sage:'#5C8A62', sky:'#3A7FA0', coral:'#E8715A', honey:'#C4970A' }[theme];
  const bg = darkMode ? '#1A1408' : 'var(--cream)';
  const cardBg = darkMode ? 'rgba(255,255,255,0.06)' : 'white';
  const textColor = darkMode ? 'white' : 'var(--brown)';
  const subColor = darkMode ? 'rgba(255,255,255,0.6)' : 'var(--brown-mid)';

  const cards = [
    {
      icon: '🌱',
      color: '#5C8A62',
      bg: '#E8F0E9',
      title: 'Completely Natural',
      desc: 'Made from sustainably sourced Salvadora persica root — the same plant used for oral hygiene across cultures for thousands of years. No chemicals, no synthetics.'
    },
    {
      icon: '😊',
      color: '#E8715A',
      bg: '#FCEAE6',
      title: 'Kids Ask For It',
      desc: 'Four yummy natural flavors make Twigglies the oral care routine kids actually request. Turn brushing battles into bonding moments.'
    },
    {
      icon: '🦷',
      color: '#3A7FA0',
      bg: '#EAF4F9',
      title: 'Dentist Approved',
      desc: 'Formulated with input from pediatric dentists and oral health specialists. A trusted daily complement to brushing — not a replacement.'
    },
    {
      icon: '🌙',
      color: '#7B5EA7',
      bg: '#EDE6F5',
      title: 'Routine Builder',
      desc: 'Designed to slot into existing routines — after meals, before bed, during car rides. Supports healthy oral sensory habits for early childhood development.'
    },
    {
      icon: '🧳',
      color: '#C4970A',

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    // Load persisted tweaks
    try {
      const saved = JSON.parse(localStorage.getItem('twigglies-tweaks') || '{}');
      if (Object.keys(saved).length) setTweaks(t => ({...t,...saved}));
    } catch(e){}

    // Tweaks panel protocol
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel')?.classList.add('open');
      }
      if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel')?.classList.remove('open');
      }
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');

    // Wire up chip controls
    document.querySelectorAll('#theme-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#theme-chips .chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        const val = chip.dataset.theme;
        setTweaks(t => { const n={...t,theme:val}; persist(n); return n; });
      });
    });
    document.querySelectorAll('#layout-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#layout-chips .chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        const val = chip.dataset.layout;
        setTweaks(t => { const n={...t,layout:val}; persist(n); return n; });
      });
    });
    document.getElementById('mascot-toggle')?.addEventListener('click', () => {
      setTweaks(t => {
        const n = {...t, showMascots: !t.showMascots};
        persist(n);
        document.getElementById('mascot-track')?.classList.toggle('on', n.showMascots);
        return n;
      });
    });
    document.getElementById('dark-toggle')?.addEventListener('click', () => {
      setTweaks(t => {
        const n = {...t, darkMode: !t.darkMode};
        persist(n);
        document.getElementById('dark-track')?.classList.toggle('on', n.darkMode);
        return n;
      });
    });
  }, []);

  function persist(vals) {
    localStorage.setItem('twigglies-tweaks', JSON.stringify(vals));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: vals},'*');
  }

  return (
    <>
      <Nav darkMode={tweaks.darkMode}/>
      <Hero theme={tweaks.theme} layout={tweaks.layout} showMascots={tweaks.showMascots} darkMode={tweaks.darkMode}/>
      <TrustBar theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <WhyParents theme={tweaks.theme} showMascots={tweaks.showMascots} darkMode={tweaks.darkMode}/>
      <HowItWorks theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <WhyMiswak theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <Products theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <Testimonials theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <DentistQuote theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <Subscribe theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <FAQ theme={tweaks.theme} darkMode={tweaks.darkMode}/>
      <Footer theme={tweaks.theme} darkMode={tweaks.darkMode}/>
    </>
  );
}

/* ── PRINT STYLES ──────────────────────────────────────────── */
@media print {
  @page { size: A4 portrait; margin: 0; }

  html, body { background: #FDFAF5 !important; }

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    animation: none !important;
    transition: none !important;
  }

  /* Hide interactive / non-print UI */
  #tweaks-panel,
  nav,
  .scroll-cue { display: none !important; }

  /* Each top-level section gets its own page */
  body > #root > * > section,
  body > #root > * > footer,
  body > #root > * > div[data-trust-bar] {
    break-before: page;
    break-inside: avoid;
  }

  /* Hero: first page — no page break before */
  section:first-of-type { break-before: auto; }

  /* Trust ticker: freeze the strip, no animation */
  div[style*="ticker"] > div {
    animation: none !important;
    transform: none !important;
    width: 100% !important;
    flex-wrap: wrap !important;
    justify-content: center !important;
    gap: 16px !important;
    padding: 0 24px !important;
  }

  /* Don't clip striped placeholders */
  div[style*="stripe"] { overflow: visible !important; }

  /* Remove transforms on product cards */
  div[style*="scale(1.04)"] { transform: none !important; }

  /* FAQ: show all answers */
  .faq-answer { display: block !important; }

  /* Subscription cards: no scale transform */
  div[style*="scale"] { transform: none !important; }

  /* Remove box shadows that look bad on print */
  * { box-shadow: none !important; }

  /* Floating hero badges: hide so they don't overlap */
  div[style*="floatBadge"] { display: none !important; }
}
</style>
