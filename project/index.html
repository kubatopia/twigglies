<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Twigglies — A gentler start to oral care</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#FAFAF7;color:#1E1A14;overflow-x:hidden;-webkit-font-smoothing:antialiased}
:root{
  --cream:#FAFAF7;--warm:#F5EDE0;--white:#FFFFFF;
  --sage:#5E8B6A;--sage-light:#EAF2EC;
  --accent:#C8714E;--accent-light:#FAF1EB;
  --text:#1E1A14;--text-mid:#5C5044;--text-light:#9B8E7E;
  --border:rgba(30,26,20,0.09);
}
.serif{font-family:'DM Serif Display',serif;font-weight:400}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.section{padding:96px 0}

.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.benefits-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

@media(max-width:900px){.benefits-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .hero-grid{grid-template-columns:1fr;gap:48px}
  .steps-grid{grid-template-columns:1fr;gap:24px}
  .section{padding:72px 0}
}
@media(max-width:600px){
  .benefits-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}

.mobile-bar{display:none;position:fixed;bottom:0;left:0;right:0;padding:14px 20px;background:var(--white);border-top:1px solid var(--border);z-index:900;box-shadow:0 -4px 24px rgba(0,0,0,0.08)}
@media(max-width:768px){.mobile-bar{display:block}}

input,select,textarea{
  width:100%;padding:13px 15px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;
  color:var(--text);outline:none;-webkit-appearance:none;appearance:none
}
input:focus,select:focus,textarea:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(94,139,106,0.13)}
input::placeholder,textarea::placeholder{color:var(--text-light)}
textarea{resize:vertical;min-height:88px}
label{display:block;font-size:13px;font-weight:500;color:var(--text-mid);margin-bottom:6px;letter-spacing:0.01em}
.field-error{color:#d94f4f;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── tokens ──────────────────────────────────────────────────────────────────
const C = {
  sage:'#5E8B6A', sageLight:'#EAF2EC',
  accent:'#C8714E', accentLight:'#FAF1EB',
  cream:'#FAFAF7', warm:'#F5EDE0',
  text:'#1E1A14', mid:'#5C5044', light:'#9B8E7E',
  border:'rgba(30,26,20,0.09)', white:'#FFFFFF',
};

// ── Btn ─────────────────────────────────────────────────────────────────────
function Btn({ children, variant='primary', href, onClick, type='button', full, small, style: extra={} }) {
  const [hov, setHov] = useState(false);
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    fontFamily:'DM Sans,sans-serif', fontWeight:600, letterSpacing:'-0.01em',
    fontSize: small ? 14 : 15,
    padding: small ? '10px 20px' : '14px 28px',
    borderRadius:100, cursor:'pointer', border:'none',
    textDecoration:'none', width: full ? '100%' : 'auto', transition:'all 0.18s',
  };
  const variants = {
    primary:{ background:C.sage, color:'#fff', boxShadow:'0 2px 14px rgba(94,139,106,0.28)' },
    outline:{ background:'transparent', color:C.text, border:`1.5px solid rgba(30,26,20,0.17)` },
    ghost:  { background:'transparent', color:C.sage, padding: small?'10px 2px':'14px 2px' },
  };
  const hover = {
    primary:{ transform:'translateY(-1px)', boxShadow:'0 6px 22px rgba(94,139,106,0.36)' },
    outline:{ borderColor:C.sage, color:C.sage },
    ghost:  { color:'#3d6b4a' },
  };
  const s = { ...base, ...variants[variant], ...(hov ? hover[variant] : {}), ...extra };
  const props = { style:s, onMouseEnter:()=>setHov(true), onMouseLeave:()=>setHov(false) };
  if (href) return <a href={href} {...props}>{children}</a>;
  return <button type={type} onClick={onClick} {...props}>{children}</button>;
}

// ── Badge ───────────────────────────────────────────────────────────────────
function Badge({ children, color=C.sage }) {
  return (
    <div style={{
      display:'inline-flex', alignItems:'center', gap:6,
      background:`${color}18`, color, borderRadius:100,
      padding:'5px 13px', fontSize:11, fontWeight:600,
      letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:18,
    }}>{children}</div>
  );
}

// ── TwigIcon ────────────────────────────────────────────────────────────────
function TwigIcon({ size=20, color='white' }) {
  const s = size / 20;
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
      <path d="M10 18 C10 18 9 12 9 8" stroke={color} strokeWidth={1.8*s} strokeLinecap="round"/>
      <path d="M9 8 C9 8 8 3 10 1" stroke={color} strokeWidth={1.5*s} strokeLinecap="round"/>
      <path d="M9 11 C9 11 5 9 3 6" stroke={color} strokeWidth={1.5*s} strokeLinecap="round"/>
      <path d="M9.5 7 C9.5 7 13 5 16 3" stroke={color} strokeWidth={1.5*s} strokeLinecap="round"/>
      <ellipse cx="10" cy="1.5" rx="3" ry="3.5" fill={color} opacity="0.9" transform="rotate(-5 10 1.5)"/>
      <ellipse cx="3" cy="5.5" rx="2.5" ry="3.5" fill={color} opacity="0.7" transform="rotate(-47 3 5.5)"/>
      <ellipse cx="16" cy="2.5" rx="2.5" ry="3.5" fill={color} opacity="0.7" transform="rotate(37 16 2.5)"/>
    </svg>
  );
}

// ── Logo ────────────────────────────────────────────────────────────────────
function Logo({ dark }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer' }}>
      <div style={{ width:30, height:30, borderRadius:9, background:C.sage, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <TwigIcon size={16} />
      </div>
      <span className="serif" style={{ fontSize:20, color: dark ? C.white : C.text, letterSpacing:'-0.01em' }}>Twigglies</span>
    </div>
  );
}

// ── Nav ─────────────────────────────────────────────────────────────────────
function Nav({ onWaitlist }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:1000,
      background: scrolled ? 'rgba(250,250,247,0.93)' : 'transparent',
      backdropFilter: scrolled ? 'blur(20px)' : 'none',
      borderBottom: `1px solid ${scrolled ? 'rgba(30,26,20,0.07)' : 'transparent'}`,
      transition:'all 0.3s',
    }}>
      <div className="container" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:64 }}>
        <Logo />
        <Btn variant="primary" onClick={onWaitlist} small>Join Waitlist</Btn>
      </div>
    </nav>
  );
}

// ── ProductVisual ────────────────────────────────────────────────────────────
function ProductVisual() {
  return (
    <div style={{
      width:'100%', maxWidth:460, aspectRatio:'4/5',
      borderRadius:32, background:C.warm,
      position:'relative', overflow:'hidden',
      display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow:'0 28px 80px rgba(30,26,20,0.11)',
    }}>
      {/* background blobs */}
      <div style={{ position:'absolute', top:'-12%', right:'-12%', width:'55%', aspectRatio:'1', borderRadius:'50%', background:'#E8D4BE', opacity:0.55 }}/>
      <div style={{ position:'absolute', bottom:'-8%', left:'-10%', width:'48%', aspectRatio:'1', borderRadius:'50%', background:C.sageLight, opacity:0.7 }}/>
      {/* dot grid */}
      <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
        <defs>
          <pattern id="pg" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="11" cy="11" r="1" fill={C.accent} opacity="0.09"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#pg)"/>
      </svg>
      {/* product photo */}
      <div style={{ position:'relative', zIndex:1, width:'78%', maxWidth:320 }}>
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/6/69/Salvadora_persica_miswak_sticks.jpg"
          alt="Miswak sticks"
          style={{
            width:'100%',
            height:'100%',
            aspectRatio:'4/5',
            objectFit:'cover',
            borderRadius:22,
            boxShadow:'0 8px 40px rgba(30,26,20,0.16)',
            border:'1px solid rgba(30,26,20,0.08)',
          }}
          loading="lazy"
        />
      </div>
    </div>
  );
}

// ── Hero ─────────────────────────────────────────────────────────────────────
function Hero({ onWaitlist }) {
  return (
    <section style={{ background:C.cream, paddingTop:128, paddingBottom:96 }}>
      <div className="container">
        <div className="hero-grid">
          <div>
            <Badge>Now taking early interest · Launching 2025</Badge>
            <h1 className="serif" style={{
              fontSize:'clamp(44px,5.5vw,70px)', lineHeight:1.07,
              color:C.text, letterSpacing:'-0.03em', marginBottom:24,
            }}>
              Get the battle<br/>out of the<br/>
              <em style={{ color:C.sage }}>bathroom.</em>
            </h1>
            <p style={{ fontSize:18, color:C.mid, lineHeight:1.65, maxWidth:420, marginBottom:36, fontWeight:400 }}>
              Twigglies is a gentle first step in oral care — designed for toddlers who aren't ready for traditional toothbrushing yet.
            </p>
            <div style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'center' }}>
              <Btn variant="primary" onClick={onWaitlist} style={{ padding:'15px 32px', fontSize:16 }}>Join the Waitlist</Btn>
              <Btn variant="ghost" href="#how-it-works">See how it works ↓</Btn>
            </div>
            <p style={{ marginTop:28, fontSize:13, color:C.light }}>🌿 &nbsp;Plant-based · Designed for toddlers · No pressure</p>
          </div>
          <div style={{ display:'flex', justifyContent:'center' }}>
            <ProductVisual />
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Problem ──────────────────────────────────────────────────────────────────
function Problem() {
  const points = [
    { icon:'😤', text:'Your toddler chews the toothbrush instead of letting you brush.' },
    { icon:'😩', text:'Every bedtime routine turns into a standoff.' },
    { icon:'🤷', text:'You\'ve tried songs, games, rewards — nothing sticks.' },
    { icon:'💭', text:'You want to build healthy habits, but forcing it feels wrong.' },
  ];
  return (
    <section style={{ background:C.warm }} className="section">
      <div className="container">
        <div style={{ maxWidth:680, margin:'0 auto' }}>
          <Badge color={C.accent}>The Problem</Badge>
          <h2 className="serif" style={{ fontSize:'clamp(32px,4vw,52px)', color:C.text, lineHeight:1.13, letterSpacing:'-0.025em', marginBottom:16 }}>
            Toothbrushing shouldn't be<br/>a nightly battle.
          </h2>
          <p style={{ fontSize:17, color:C.mid, lineHeight:1.65, marginBottom:48, maxWidth:500 }}>
            Most toddlers go through a phase where oral care feels impossible. It's developmental — not a parenting failure. And there aren't many good options designed for this stage.
          </p>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            {points.map((p,i) => (
              <div key={i} style={{
                display:'flex', alignItems:'flex-start', gap:16,
                background:C.white, borderRadius:14, padding:'18px 22px',
                border:`1px solid rgba(30,26,20,0.07)`,
              }}>
                <span style={{ fontSize:22, lineHeight:1, flexShrink:0, marginTop:1 }}>{p.icon}</span>
                <p style={{ fontSize:15.5, color:C.mid, lineHeight:1.6, margin:0 }}>{p.text}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Solution ─────────────────────────────────────────────────────────────────
function Solution() {
  const cards = [
    { title:'For the in-between stage', body:'Designed for toddlers who aren\'t ready for a toothbrush yet — but need to start building the habit.' },
    { title:'Not a replacement', body:'Twigglies is a stepping stone. The goal is to make the transition to full brushing smoother over time.' },
    { title:'Plant-based and gentle', body:'Inspired by natural oral-care materials. Simple, safe, and designed with toddler behavior in mind.' },
  ];
  return (
    <section style={{ background:C.cream }} className="section">
      <div className="container">
        <div style={{ maxWidth:860, margin:'0 auto', textAlign:'center' }}>
          <Badge color={C.sage}>Introducing Twigglies</Badge>
          <h2 className="serif" style={{ fontSize:'clamp(32px,4vw,52px)', color:C.text, lineHeight:1.13, letterSpacing:'-0.025em', marginBottom:18 }}>
            A gentler entry point<br/>for oral care.
          </h2>
          <p style={{ fontSize:18, color:C.mid, lineHeight:1.7, maxWidth:540, margin:'0 auto 52px' }}>
            Twigglies is designed for the stage <em>before</em> traditional brushing clicks — a low-pressure way to introduce the routine without the resistance.
          </p>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))', gap:20, textAlign:'left' }}>
            {cards.map((c,i) => (
              <div key={i} style={{ background:C.sageLight, borderRadius:18, padding:'26px 22px', border:`1px solid rgba(94,139,106,0.13)` }}>
                <h3 className="serif" style={{ fontSize:19, color:C.text, marginBottom:9, lineHeight:1.25 }}>{c.title}</h3>
                <p style={{ fontSize:14, color:C.mid, lineHeight:1.65, margin:0 }}>{c.body}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ── HowItFits ────────────────────────────────────────────────────────────────
function HowItFits() {
  const steps = [
    { num:'01', title:'Offer', color:C.sage,    body:'Introduce Twigglies during oral-care time alongside your usual routine. No pressure, no forcing.' },
    { num:'02', title:'Explore', color:C.accent, body:'Let your child lead. Chewing, holding, exploring — it all helps build comfort with the routine.' },
    { num:'03', title:'Build', color:'#7B5EA7', body:'Over time the routine becomes familiar. Transition to a toothbrush when they\'re ready.' },
  ];
  return (
    <section style={{ background:C.warm }} className="section" id="how-it-works">
      <div className="container">
        <div style={{ textAlign:'center', marginBottom:52 }}>
          <Badge color="#7B5EA7">The Routine</Badge>
          <h2 className="serif" style={{ fontSize:'clamp(32px,4vw,52px)', color:C.text, lineHeight:1.13, letterSpacing:'-0.025em' }}>
            Simple. Consistent.<br/>Low-pressure.
          </h2>
        </div>
        <div className="steps-grid" style={{ maxWidth:860, margin:'0 auto' }}>
          {steps.map((s,i) => (
            <div key={i} style={{ textAlign:'center', padding:'0 12px' }}>
              <div style={{
                width:60, height:60, borderRadius:18, background:C.white,
                border:`2px solid ${s.color}28`, display:'flex', alignItems:'center',
                justifyContent:'center', margin:'0 auto 18px',
                boxShadow:`0 4px 20px ${s.color}1A`,
              }}>
                <span className="serif" style={{ fontSize:20, color:s.color }}>{s.num}</span>
              </div>
              <h3 className="serif" style={{ fontSize:24, color:C.text, marginBottom:10 }}>{s.title}</h3>
              <p style={{ fontSize:14.5, color:C.mid, lineHeight:1.65, maxWidth:240, margin:'0 auto' }}>{s.body}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── Benefits ─────────────────────────────────────────────────────────────────
function Benefits() {
  const cards = [
    { icon:'🤝', title:'Less resistance',        body:'Meets toddlers where they are. Lower pressure, less of a fight.' },
    { icon:'🌱', title:'Habit-building first',   body:'Builds the routine before the full brushing skill is there.' },
    { icon:'🧸', title:'Designed for this stage',body:'Made with toddler behavior and sensory sensitivity in mind.' },
    { icon:'🪴', title:'Plant-based',            body:'Inspired by natural oral-care materials. Simple ingredients.' },
  ];
  return (
    <section style={{ background:C.cream }} className="section">
      <div className="container">
        <div style={{ textAlign:'center', marginBottom:48 }}>
          <Badge color={C.sage}>Why Twigglies</Badge>
          <h2 className="serif" style={{ fontSize:'clamp(32px,4vw,52px)', color:C.text, lineHeight:1.13, letterSpacing:'-0.025em' }}>
            Why parents<br/>may want this
          </h2>
        </div>
        <div className="benefits-grid" style={{ maxWidth:960, margin:'0 auto' }}>
          {cards.map((c,i) => (
            <div key={i} style={{ background:C.white, borderRadius:18, padding:'26px 22px', border:`1px solid rgba(30,26,20,0.07)`, boxShadow:'0 2px 14px rgba(30,26,20,0.04)' }}>
              <div style={{ fontSize:26, marginBottom:12 }}>{c.icon}</div>
              <h3 className="serif" style={{ fontSize:19, color:C.text, marginBottom:7 }}>{c.title}</h3>
              <p style={{ fontSize:14, color:C.mid, lineHeight:1.65, margin:0 }}>{c.body}</p>
            </div>
          ))}
        </div>
      </div>
    </section>

}

// ── WaitlistForm ─────────────────────────────────────────────────────────────
function WaitlistForm({ id }) {
  const [f, setF] = useState({ name:'', email:'', age:'', challenge:'' });
  const [err, setErr] = useState({});
  const [done, setDone] = useState(false);
  const [loading, setLoading] = useState(false);

  const ages = [
    { v:'',         l:'Select age…' },
    { v:'under-1',  l:'Under 1 year' },
    { v:'1-2',      l:'1–2 years' },
    { v:'2-3',      l:'2–3 years' },
    { v:'3-4',      l:'3–4 years' },
    { v:'4-5',      l:'4–5 years' },
    { v:'5plus',    l:'5+ years' },
    { v:'expecting',l:'Expecting / not yet born' },
  ];

  function validate() {
    const e = {};
    if (!f.name.trim())  e.name  = 'Name is required';
    if (!f.email.trim()) e.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) e.email = 'Enter a valid email';
    if (!f.age)          e.age   = 'Please select an age';
    return e;
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErr(errs); return; }
    setLoading(true);
    // ── CONNECT YOUR BACKEND HERE ────────────────────────────────────────────
    // await fetch('/api/waitlist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(f) });
    // Works with Mailchimp, Klaviyo, Supabase, Airtable, or any REST endpoint.
    // ─────────────────────────────────────────────────────────────────────────
    await new Promise(r => setTimeout(r, 800));
    console.log('Waitlist submission:', f);
    setLoading(false);
    setDone(true);
  }

  const upd = (k, v) => { setF({...f,[k]:v}); setErr({...err,[k]:''}); };

  return (
    <section id={id} style={{ background:C.sage, padding:'96px 0' }}>
      <div className="container">
        <div style={{ maxWidth:520, margin:'0 auto' }}>
          {!done ? (
            <>
              <div style={{ textAlign:'center', marginBottom:40 }}>
                <div style={{ display:'inline-flex', alignItems:'center', background:'rgba(255,255,255,0.15)', color:'#fff', borderRadius:100, padding:'5px 13px', fontSize:11, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:18 }}>Early Access</div>
                <h2 className="serif" style={{ fontSize:'clamp(32px,4vw,50px)', color:'#fff', lineHeight:1.1, letterSpacing:'-0.025em', marginBottom:14 }}>
                  Be first to<br/>try Twigglies.
                </h2>
                <p style={{ fontSize:16, color:'rgba(255,255,255,0.76)', lineHeight:1.65 }}>
                  We're in early development and looking for parent feedback. Join the waitlist for early access and updates.
                </p>
              </div>
              <form onSubmit={handleSubmit} noValidate style={{ background:C.white, borderRadius:22, padding:'32px 28px', boxShadow:'0 20px 64px rgba(0,0,0,0.15)' }}>
                <div className="form-row" style={{ marginBottom:16 }}>
                  <div>
                    <label htmlFor="wl-name">First name</label>
                    <input id="wl-name" type="text" placeholder="Jordan" value={f.name} onChange={e=>upd('name',e.target.value)} style={{ borderColor:err.name?'#d94f4f':undefined }}/>
                    {err.name && <p className="field-error">{err.name}</p>}
                  </div>
                  <div>
                    <label htmlFor="wl-email">Email</label>
                    <input id="wl-email" type="email" placeholder="you@email.com" value={f.email} onChange={e=>upd('email',e.target.value)} style={{ borderColor:err.email?'#d94f4f':undefined }}/>
                    {err.email && <p className="field-error">{err.email}</p>}
                  </div>
                </div>
                <div style={{ marginBottom:16 }}>
                  <label htmlFor="wl-age">Child's age</label>
                  <div style={{ position:'relative' }}>
                    <select id="wl-age" value={f.age} onChange={e=>upd('age',e.target.value)} style={{ borderColor:err.age?'#d94f4f':undefined, paddingRight:40 }}>
                      {ages.map(a=><option key={a.v} value={a.v}>{a.l}</option>)}
                    </select>
                    <svg style={{ position:'absolute', right:13, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }} width="16" height="16" viewBox="0 0 16 16" fill="none">
                      <path d="M4 6l4 4 4-4" stroke="#9B8E7E" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>
                  {err.age && <p className="field-error">{err.age}</p>}
                </div>
                <div style={{ marginBottom:24 }}>
                  <label htmlFor="wl-challenge">What's the hardest part of oral care for your toddler? <span style={{ color:C.light, fontWeight:400 }}>(optional)</span></label>
                  <textarea id="wl-challenge" placeholder="e.g. they clench their mouth shut, fight the toothbrush…" value={f.challenge} onChange={e=>upd('challenge',e.target.value)}/>
                </div>
                <button type="submit" style={{
                  width:'100%', padding:'15px', border:'none', borderRadius:100,
                  background:C.sage, color:'#fff', fontFamily:'DM Sans,sans-serif',
                  fontWeight:600, fontSize:16, cursor:'pointer', transition:'all 0.18s',
                  boxShadow:'0 2px 14px rgba(94,139,106,0.28)',
                  opacity: loading ? 0.75 : 1,
                }} disabled={loading}>
                  {loading ? 'Joining…' : 'Join the Waitlist →'}
                </button>
                <p style={{ textAlign:'center', fontSize:12, color:C.light, marginTop:12 }}>No spam. Unsubscribe anytime.</p>
              </form>
            </>
          ) : (
            <div style={{ background:C.white, borderRadius:22, padding:'52px 36px', textAlign:'center', boxShadow:'0 20px 64px rgba(0,0,0,0.15)' }}>
              <div style={{ fontSize:44, marginBottom:18 }}>🌿</div>
              <h3 className="serif" style={{ fontSize:32, color:C.text, marginBottom:12 }}>You're on the list.</h3>
              <p style={{ fontSize:16, color:C.mid, lineHeight:1.65, maxWidth:320, margin:'0 auto' }}>Thanks for your interest in Twigglies. We'll be in touch with early access info and updates.</p>
              <p style={{ marginTop:22, fontSize:13, color:C.light }}>— The Twigglies team</p>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

// ── FAQ ──────────────────────────────────────────────────────────────────────
function FAQ() {

  const faqs = [
    { q:'What is Twigglies?',
      a:'Twigglies is a plant-based oral care product for toddlers, designed as a gentle first step before traditional toothbrushing. It\'s built to help parents introduce oral care habits with less resistance.' },
    { q:'Is this a toothbrush replacement?',
      a:'No. Twigglies is a stepping stone — an easier entry point for toddlers who aren\'t ready for a toothbrush yet. The goal is to build comfort with the routine so the transition to regular brushing is smoother.' },
    { q:'What age is it designed for?',
      a:'Twigglies is being developed with toddlers in mind, primarily ages 1 to 4. We\'re working with parents and pediatric health advisors to refine the product for this specific stage.' },
    { q:'When will it be available?',
      a:'We\'re in early development. Joining the waitlist is the best way to hear first when Twigglies launches and to get early access before the general public.' },
    { q:'How do I get early access?',
      a:'Sign up using the form on this page. Early access members will be first to try Twigglies and will have the opportunity to provide feedback that helps shape the product.' },
    { q:'Is it safe for young children?',
      a:'Safety is our top priority. We\'re developing Twigglies with advisors to ensure it\'s appropriate for the toddler age range. Detailed safety information will be available ahead of launch.' },
  ];
  return (
    <section style={{ background:C.cream }} className="section">
      <div className="container">
        <div style={{ maxWidth:660, margin:'0 auto' }}>
          <div style={{ textAlign:'center', marginBottom:48 }}>
            <Badge color={C.accent}>Questions</Badge>
            <h2 className="serif" style={{ fontSize:'clamp(32px,4vw,48px)', color:C.text, lineHeight:1.13, letterSpacing:'-0.025em' }}>Common questions</h2>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {faqs.map((faq,i) => (
              <div key={i} style={{ borderRadius:14, overflow:'hidden', border:`1px solid ${open===i?'rgba(94,139,106,0.22)':C.border}`, background:open===i?C.sageLight:C.white, transition:'all 0.2s' }}>
                <button onClick={()=>setOpen(open===i?null:i)} style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 22px', background:'none', border:'none', cursor:'pointer', textAlign:'left', gap:14 }}>
                  <span className="serif" style={{ fontSize:16.5, color:C.text, lineHeight:1.3 }}>{faq.q}</span>
                  <span style={{ width:24, height:24, borderRadius:'50%', flexShrink:0, background:open===i?C.sage:'rgba(30,26,20,0.07)', color:open===i?'#fff':C.mid, display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, fontWeight:600, transition:'all 0.2s' }}>
                    {open===i?'−':'+'}
                  </span>
                </button>
                {open===i && <div style={{ padding:'0 22px 18px', fontSize:15, color:C.mid, lineHeight:1.7 }}>{faq.a}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>

}

// ── MobileBar ────────────────────────────────────────────────────────────────
function MobileBar({ onWaitlist, show }) {
  if (!show) return null;
  return (
    <div className="mobile-bar">
      <button onClick={onWaitlist} style={{ width:'100%', padding:'14px', border:'none', borderRadius:100, background:C.sage, color:'#fff', fontFamily:'DM Sans,sans-serif', fontWeight:600, fontSize:15, cursor:'pointer' }}>
        Join the Waitlist
      </button>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 320);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const toWaitlist = () => document.getElementById('waitlist')?.scrollIntoView({ behavior:'smooth' });
  return (
    <>
      <Nav onWaitlist={toWaitlist} />
      <Hero onWaitlist={toWaitlist} />
      <Problem />
      <Solution />
      <HowItFits />
      <Benefits />
      <WaitlistForm id="waitlist" />
      <FAQ />
      <Footer />
      <MobileBar onWaitlist={toWaitlist} show={scrolled} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!--
COMPONENT STRUCTURE
───────────────────
Nav          — sticky header, logo + waitlist CTA
Hero         — headline, subhead, product visual, CTAs
Problem      — 4 parent pain-point cards
Solution     — 3 positioning cards (what it is / isn't)
HowItFits    — 3-step routine visual
Benefits     — 4 benefit cards
WaitlistForm — name, email, age, optional question; success state
FAQ          — accordion, 6 questions
Footer       — logo, email, Instagram, copyright
MobileBar    — sticky bottom CTA on mobile (appears after hero scroll)

WHERE TO EDIT COPY
──────────────────
Every string is inline in each component — search for the section function.
Hero headline  → Hero(), the <h1> block
Pain points    → Problem(), the `points` array
Step copy      → HowItFits(), the `steps` array
Benefit cards  → Benefits(), the `cards` array
FAQ answers    → FAQ(), the `faqs` array

WHERE TO CONNECT THE FORM
──────────────────────────
WaitlistForm(), inside handleSubmit():
  Replace the comment block with your API call.
  The `f` object contains: { name, email, age, challenge }
  Works with any REST endpoint — Supabase, Mailchimp, Klaviyo, Airtable, etc.

WHAT TO TEST FIRST (MVP)
─────────────────────────
1. Headline resonance — A/B test "Get the battle out of the bathroom." vs. alternatives
2. Waitlist conversion rate — track form submissions vs. unique visitors
3. Open-text challenge field — read every response; this is your qualitative gold
4. Age distribution — tells you which cohort to prioritize in early outreach
-->
